name: firebase_dart_admin_auth_sdk
description: A Dart SDK for backend Firebase authentication and admin flows with keyless server credentials and optional service account impersonation.
version: 0.1.1
repository: https://github.com/aortem/firebase-dart-admin-auth-sdk
license: BSD-3

environment:
  sdk: ^3.11.4

dependencies:
#------------------ STANDARD FEATURES---------------------------------
## There are three standard libraries. 

  ds_standard_features: ^0.1.5 #Standard Dart Team Utilities For HTTP //Default
  googleapis_auth: ^2.3.0 #Googe Apis
  jwt_generator: ^0.0.9 # Internal JWT Generator Package
  
#------------------ TESTING FEATURES---------------------------------

dev_dependencies:
  ds_tools_testing: ^0.1.4 #Standard Dart Team Testing Tools
  test: ^1.24.0
  lints: ^6.0.0
  git_hooks: any

# Optional Local Hooks for development.
git_hooks:
  hooks:
    pre-commit: ./local_dev_tools/validate_commit.dart
    commit-msg: ./local_dev_tools/validate_commit_msg.dart
    pre-push: ./local_dev_tools/validate_branch.dart
